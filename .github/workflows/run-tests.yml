name: run-tests

on:
    pull_request:
        types:
            - opened
            - reopened
            - synchronize
            - ready_for_review

    push:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.3, 8.4, 8.4]
        laravel: [^11.31, ^12.0, ^13.0]
        dependency-version: [prefer-lowest, prefer-stable]
        testbench: [^9.6, ^10.0, ^11.0]
        exclude:
            -   laravel: ^11.31
                testbench: ^10.0
            -   laravel: ^11.31
                testbench: ^11.0
            -   laravel: ^12.0
                testbench: ^9.6
            -   laravel: ^12.0
                testbench: ^11.0
            -   laravel: ^13.0
                testbench: ^9.6
            -   laravel: ^13.0
                testbench: ^10.0

    name: PHP${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.dependency-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --${{ matrix.dependency-version }} --prefer-dist --no-interaction --no-suggest

      - name: Execute tests
        run: vendor/bin/phpunit
